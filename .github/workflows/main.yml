name: Java CI amb JUnit

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Hem tret la línia del cache: maven que donava l'error
    - name: Build and Test
      run: |
        mvn test
